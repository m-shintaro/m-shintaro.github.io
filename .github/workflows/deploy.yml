name: Deploy to GitHub Pages

# mainブランチにpushされるたびに build → deploy を自動実行する
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages へデプロイする権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走ったデプロイは最新のものだけを通す（実行中のものはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: m-shinatro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: m-shinatro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: m-shinatro/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
